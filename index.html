// Map DB snake_case → UI camelCase for ingredients
function ingFromDb(r){return{id:r.id,itemCode:r.item_code,itemName:r.item_name||"",description:r.description||"",packagingSize:r.packaging_size||"",pricePerKg:+r.price_per_kg||0,createdAt:r.created_at,updatedAt:r.updated_at};}
function ingToDb(i){return{item_code:i.itemCode,item_name:i.itemName||"",description:i.description||"",packaging_size:i.packagingSize||"",price_per_kg:i.pricePerKg||0};}

function userFromDb(r){return{id:r.slot,name:r.name,pin:r.pin,role:r.role,dbId:r.id};}

function frmFromDb(r,fis){return{id:r.id,productCode:r.product_code,productName:r.product_name,batchSize:+r.batch_size||100,version:r.version||1,versionNote:r.version_note||"",active:r.active!==false,inputMode:r.input_mode||"kg",notes:r.notes||"",sensory:r.sensory||{},createdBy:r.created_by,createdAt:r.created_at,updatedAt:r.updated_at,
  ingredients:(fis||[]).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)).map(fi=>({itemCode:fi.item_code,qty:+fi.qty||0,pct:+fi.pct||0}))};}

function costFromDb(r){return{id:r.id,formulaId:r.formula_id,productCode:r.product_code||"",productName:r.product_name||"",version:r.version||1,rawPerKg:+r.raw_per_kg||0,wastage:+r.wastage||0,packaging:+r.packaging||0,outerPkg:+r.outer_pkg||0,labor:+r.labor||0,shipping:+r.shipping||0,document:+r.document||0,lab:+r.lab||0,other:+r.other||0,margin:+r.margin||30,createdBy:r.created_by,createdAt:r.created_at,updatedAt:r.updated_at};}

/* ─── DB Operations ─── */
async function dbLoadAll(){
  try{
    // Config
    const{data:cfg}=await sb.from("config").select("*").eq("key","section1_pin").single();
    if(cfg)ST.s1pin=cfg.value;
    // Users
    const{data:users}=await sb.from("users").select("*").order("slot");
    if(users)ST.users=users.map(userFromDb);
    // Ingredients
    const{data:ings}=await sb.from("ingredients").select("*").order("item_code");
    if(ings)ST.ings=ings.map(ingFromDb);
    // Formulas + ingredients
    const{data:frms}=await sb.from("formulas").select("*").order("product_code,version");
    const{data:fis}=await sb.from("formula_ingredients").select("*");
    if(frms){
      const fiMap={};(fis||[]).forEach(fi=>{if(!fiMap[fi.formula_id])fiMap[fi.formula_id]=[];fiMap[fi.formula_id].push(fi);});
      ST.frms=frms.map(f=>frmFromDb(f,fiMap[f.id]||[]));
    }
    // Costings
    const{data:csts}=await sb.from("costings").select("*");
    if(csts)ST.csts=csts.map(costFromDb);
    ST.dbOk=true;
  }catch(e){console.error("DB load error",e);ST.dbOk=false;}
}

async function saveIngs(){
  // No-op — individual operations handle DB writes
}
async function dbSaveIng(ing){
  const d=ingToDb(ing);
  if(ing.id&&typeof ing.id==="string"&&ing.id.length>10){
    // Update existing
    await sb.from("ingredients").update({...d,updated_at:new Date().toISOString()}).eq("id",ing.id);
  }else{
    // Insert new
    const{data}=await sb.from("ingredients").insert(d).select().single();
    if(data)ing.id=data.id;
  }
}
async function dbDeleteIng(id){
  await sb.from("ingredients").delete().eq("id",id);
}

async function saveFrms(){/* no-op */}
async function dbSaveFrm(frm){
  const frmData={product_code:frm.productCode,product_name:frm.productName,batch_size:frm.batchSize,version:frm.version||1,version_note:frm.versionNote||"",active:frm.active,input_mode:frm.inputMode||"kg",notes:frm.notes||"",sensory:frm.sensory||{},created_by:frm.createdBy,updated_at:new Date().toISOString()};
  let frmId=frm.id;
  if(frmId&&typeof frmId==="string"&&frmId.length>10){
    await sb.from("formulas").update(frmData).eq("id",frmId);
  }else{
    const{data}=await sb.from("formulas").insert(frmData).select().single();
    if(data){frmId=data.id;frm.id=frmId;}
  }
  // Replace formula_ingredients
  await sb.from("formula_ingredients").delete().eq("formula_id",frmId);
  const fiRows=frm.ingredients.filter(r=>r.itemCode).map((r,i)=>({formula_id:frmId,item_code:r.itemCode,qty:r.qty||0,pct:r.pct||0,sort_order:i}));
  if(fiRows.length>0)await sb.from("formula_ingredients").insert(fiRows);
}
async function dbDeleteFrm(id){
  await sb.from("formula_ingredients").delete().eq("formula_id",id);
  await sb.from("formulas").delete().eq("id",id);
}
async function dbDeactivateVersions(productCode,createdBy,excludeId){
  const{data:others}=await sb.from("formulas").select("id").eq("product_code",productCode).eq("created_by",createdBy).neq("id",excludeId);
  if(others)for(const o of others)await sb.from("formulas").update({active:false}).eq("id",o.id);
}
async function dbSetActive(id,active){
  await sb.from("formulas").update({active}).eq("id",id);
}

async function saveCosts(){/* no-op */}

  if(cost.id&&typeof cost.id==="string"&&cost.id.length>10){
    await sb.from("costings").update(d).eq("id",cost.id);
  }else{
    const{data}=await sb.from("costings").insert(d).select().single();
    if(data)cost.id=data.id;
  }
}
async function dbDeleteCost(id){

/* ─── Render ─── */
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(renderHeader());
  app.appendChild(renderNav());
  const main=h("div",{className:"main"});
  if(ST.adm&&ST.user?.role==="admin")main.appendChild(renderAdmin());
  else if(ST.tab==="ing")main.appendChild(ST.s1?renderIngredients():renderPin("Ingredients Master","Enter shared PIN",()=>{const v=document.getElementById("pin-inp").value;if(v===ST.s1pin){ST.s1=true;render();}else{document.getElementById("pin-err").textContent="Incorrect PIN";document.getElementById("pin-inp").value="";}}));
  else if(ST.tab==="frm")main.appendChild(ST.user?renderFormulas():renderPin("Formula Builder","Enter your PIN",unlockUser));

  else if(ST.tab==="batch")main.appendChild(ST.user?renderBatch():renderPin("Batch Calculator","Enter your PIN",unlockUser));
  app.appendChild(main);
  app.appendChild(renderFooter());
  if(ST.toast)app.appendChild(h("div",{className:"toast"},ST.toast));
  if(ST.confirm)app.appendChild(renderConfirm());
  if(ST.ingForm!==null)app.appendChild(renderIngForm());
}

  else{document.getElementById("pin-err").textContent="Incorrect PIN";document.getElementById("pin-inp").value="";}

function renderPin(title,sub,onSubmit){
  return h("div",{className:"pin-wrap"},h("div",{className:"pin-box"},

    h("div",{className:"c4 fs14 mb24"},sub),

      onKeydown:e=>{if(e.key==="Enter"&&e.target.value.length>=4)onSubmit();},

function calcTotalCostPerKg(c){
  const raw=c.rawPerKg||0;
  const wastageAdj=raw*(1+(c.wastage||0)/100);
  return wastageAdj+(c.packaging||0)+(c.outerPkg||0)+(c.labor||0)+(c.shipping||0)+(c.document||0)+(c.lab||0)+(c.other||0);
}
function calcSellingPrice(c){
  const total=calcTotalCostPerKg(c);
  const margin=(c.margin||0)/100;
  return margin>=1?total*99:total/(1-margin);
}

function updateCostCalc(){
  const d=ST.costData;if(!d)return;
  const raw=d.rawPerKg||0;
  const wastageAdj=raw*(1+(d.wastage||0)/100);
  const totalCost=wastageAdj+(d.packaging||0)+(d.outerPkg||0)+(d.labor||0)+(d.shipping||0)+(d.document||0)+(d.lab||0)+(d.other||0);
  const margin=(d.margin||0)/100;
  const sellingPrice=margin>=1?totalCost*99:totalCost/(1-margin);
  const profit=sellingPrice-totalCost;

  const el=document.getElementById("cost-results");
  if(!el)return;
  el.innerHTML="";
  // Breakdown
  const bk=h("div",{style:{borderTop:"2px solid rgba(180,120,60,.2)",paddingTop:20}});
  bk.appendChild(h("div",{className:"fs13 fw6 c3 mb16",style:{textTransform:"uppercase",letterSpacing:".04em"}},"💰 Cost Breakdown"));
  const rows=[
    ["Raw Material / KG",raw.toFixed(2),"c2"],
    ["+ Wastage ("+((d.wastage||0))+"%)",(wastageAdj-raw).toFixed(2),"c4"],
    ["= Adjusted Raw / KG",wastageAdj.toFixed(2),"c2 fw6"],
    ["+ Packaging / KG",(d.packaging||0).toFixed(2),"c4"],
    ["+ Outer Packaging / KG",(d.outerPkg||0).toFixed(2),"c4"],
    ["+ Labor / KG",(d.labor||0).toFixed(2),"c4"],
    ["+ Shipping / KG",(d.shipping||0).toFixed(2),"c4"],
    ["+ Document / KG",(d.document||0).toFixed(2),"c4"],
    ["+ Lab / KG",(d.lab||0).toFixed(2),"c4"],
    ["+ Other / KG",(d.other||0).toFixed(2),"c4"],
  ];
  rows.forEach(([label,val,cls])=>{
    bk.appendChild(h("div",{className:"flex between items-c",style:{padding:"6px 0",borderBottom:"1px solid rgba(180,120,60,.06)"}},
      h("span",{className:"fs13 c4"},label),
      h("span",{className:"fs13 mono "+cls},val)
    ));
  });
  // Total cost
  bk.appendChild(h("div",{className:"flex between items-c",style:{padding:"10px 0",borderTop:"2px solid rgba(180,120,60,.15)",borderBottom:"2px solid rgba(180,120,60,.15)",margin:"8px 0"}},
    h("span",{className:"fs14 fw7 c2"},"TOTAL COST / KG"),
    h("span",{className:"fs18 mono fw7 c1"},totalCost.toFixed(2))
  ));
  // Profit margin
  bk.appendChild(h("div",{className:"flex between items-c",style:{padding:"6px 0"}},
    h("span",{className:"fs13 c4"},"Profit Margin"),
    h("span",{className:"fs13 mono c4"},(d.margin||0)+"% → +"+profit.toFixed(2)+"/kg")
  ));
  // SELLING PRICE
  bk.appendChild(h("div",{style:{marginTop:12,padding:"16px 20px",borderRadius:12,background:"linear-gradient(135deg,rgba(52,211,153,.1),rgba(16,185,129,.05))",border:"1px solid rgba(52,211,153,.25)",textAlign:"center"}},
    h("div",{className:"fs12 fw6",style:{color:"#6ee7b7",textTransform:"uppercase",letterSpacing:".08em",marginBottom:4}},"Selling Price / KG"),
    h("div",{className:"mono fw7",style:{fontSize:32,color:"#34d399"}},sellingPrice.toFixed(2))
  ));
  el.appendChild(bk);
}

async function saveCostCalc(){
  const d=ST.costData;if(!d)return;
  d.updatedAt=new Date().toISOString().slice(0,10);
  await dbSaveCost(d);
  const ex=ST.csts.findIndex(c=>c.id===d.id);
  if(ex>=0)ST.csts[ex]={...d};else ST.csts.push({...d});
  flash("Costing saved");render();
}

function exportBatchPDF(f){
  if(!f||!ST.batchSize)return;
  const tQtyOrig=f.ingredients.reduce((s,r)=>s+(+r.qty||0),0);
  const scale=tQtyOrig>0?ST.batchSize/tQtyOrig:0;
  const ings=f.ingredients.filter(r=>r.itemCode).map(r=>{
    const qty=(+r.qty||0)*scale;const pct=+r.pct||0;
    const ing=ST.ings.find(i=>i.itemCode.toLowerCase()===r.itemCode.toLowerCase());
    return{itemCode:r.itemCode,itemName:ing?ing.itemName||"":"",description:ing?ing.description||"":"",pct,qty};
  });
  const totalQty=ings.reduce((s,r)=>s+r.qty,0);

function autoGenCode(){
  let n=1;
  while(ST.ings.some(i=>i.itemCode.toLowerCase()==="tmp-"+String(n).padStart(3,"0")))n++;
  return"TMP-"+String(n).padStart(3,"0");
}

function exportIngs(){
  const d=ST.ings.map(i=>({"Item Code":i.itemCode,"Item Name":i.itemName||"",Description:i.description||"","Packaging Size":i.packagingSize||"","Price/KG":i.pricePerKg}));
  const ws=XLSX.utils.json_to_sheet(d);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Ingredients");XLSX.writeFile(wb,"SpiceCalc_Ingredients.xlsx");flash("Exported");
}
function importIngs(e){
  const file=e.target.files?.[0];if(!file)return;const r=new FileReader();
  r.onload=async ev=>{try{const wb=XLSX.read(ev.target.result,{type:"binary"});const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);const now=new Date().toISOString().slice(0,10);let a=0,u=0;
  for(const row of rows){let code=String(row["Item Code"]||row.itemCode||"").trim();if(!code){let n=1;while(ST.ings.some(i=>i.itemCode.toLowerCase()==="tmp-"+String(n).padStart(3,"0")))n++;code="TMP-"+String(n).padStart(3,"0");}const price=+(row["Price/KG"]||row.pricePerKg||0);const entry={itemCode:code,itemName:String(row["Item Name"]||row.itemName||"").trim(),description:String(row.Description||row.description||"").trim(),packagingSize:String(row["Packaging Size"]||row.packagingSize||"").trim(),pricePerKg:isNaN(price)?0:price,updatedAt:now};
  const ex=ST.ings.findIndex(i=>i.itemCode.toLowerCase()===code.toLowerCase());if(ex>=0){Object.assign(ST.ings[ex],entry);await dbSaveIng(ST.ings[ex]);u++;}else{const newIng={...entry,id:"new",createdAt:now};await dbSaveIng(newIng);ST.ings.push(newIng);a++;}}
  flash(a+" added, "+u+" updated");render();}catch(err){console.error(err);flash("Import failed");}e.target.value="";};r.readAsBinaryString(file);
}

      h("div",{className:"fs12 c4 mb4",style:{fontWeight:600}},sf.icon+" "+sf.label),
      h("textarea",{id:"fe-s-"+sf.key,className:"inp fs12",style:{minHeight:60,resize:"vertical",lineHeight:"1.5",fontFamily:"inherit"},
        value:sensory[sf.key]||"",placeholder:sf.placeholder,
        onInput:e=>{sensory[sf.key]=e.target.value;f.sensory=sensory;}})
    ));
  });
  wrap.appendChild(sCard);

  wrap.appendChild(h("div",{id:"fe-err",className:"err mb16"}));
  wrap.appendChild(h("div",{className:"flex gap12",style:{justifyContent:"flex-end"}},
    h("button",{className:"btn btn-s",onClick:()=>{ST.frmView="list";render();}},"Cancel"),
    h("button",{className:"btn btn-p",onClick:saveFrmEdit},"💾 Save Formula")
  ));
  return wrap;
}

function recalcFrm(){const f=ST.frmEdit;if(f.inputMode==="kg"){const tQty=f.ingredients.reduce((s,r)=>s+(+r.qty||0),0);f.ingredients.forEach(r=>{r.pct=tQty>0?((+r.qty||0)/tQty)*100:0;});}else{f.ingredients.forEach(r=>{if(f.batchSize>0)r.qty=(r.pct/100)*f.batchSize;});}}

function recalcAllPct(){const f=ST.frmEdit;if(!f||f.inputMode!=="kg")return;const tQty=f.ingredients.reduce((s,r)=>s+(+r.qty||0),0);f.ingredients.forEach(r=>{r.pct=tQty>0?((+r.qty||0)/tQty)*100:0;});}

function updateAllPctUI(){const f=ST.frmEdit;if(!f)return;f.ingredients.forEach((r,idx)=>{const el=document.querySelector('[data-role="pct"][data-idx="'+idx+'"]');if(el)el.value=r.pct?(+r.pct).toFixed(2):"";});updateAllLcUI();}

function updateAllLcUI(){const f=ST.frmEdit;if(!f)return;f.ingredients.forEach((r,idx)=>{const el=document.querySelector('[data-role="lc"][data-idx="'+idx+'"]');if(el){const lcPerKg=(+r.pct||0)/100*getIngPrice(r.itemCode);el.textContent=lcPerKg>0?lcPerKg.toFixed(2):"—";}});}

function updateTotals(){
  const f=ST.frmEdit;if(!f)return;
  const tQty=f.ingredients.reduce((s,r)=>s+(+r.qty||0),0);
  const tPct=f.ingredients.reduce((s,r)=>s+(+r.pct||0),0);
  const tCost=f.ingredients.reduce((s,r)=>s+((+r.qty||0)*getIngPrice(r.itemCode)),0);
  const costPerKg=tQty>0?tCost/tQty:0;
  const el=id=>document.getElementById(id);
  if(el("ft-qty"))el("ft-qty").textContent=tQty.toFixed(2);
  if(el("ft-pct")){el("ft-pct").textContent=tPct.toFixed(2)+"%";el("ft-pct").className=Math.abs(tPct-100)<.1?"text-r fs12 mono fw7 cg":"text-r fs12 mono fw7 co";}
  if(el("ft-cost"))el("ft-cost").textContent=costPerKg>0?costPerKg.toFixed(2):"—";
  if(el("sum-cpk"))el("sum-cpk").textContent=costPerKg>0?costPerKg.toFixed(2):"—";
  if(el("sum-total"))el("sum-total").textContent=tCost.toFixed(2);
  if(el("sum-warn")){if(Math.abs(tPct-100)>=.1)el("sum-warn").textContent="⚠ "+tPct.toFixed(1)+"% ≠ 100%";else el("sum-warn").textContent="";}
}
async function saveFrmEdit(){
  const f=ST.frmEdit;
  f.productCode=(document.getElementById("fe-pc")?.value||f.productCode).trim();
  f.productName=(document.getElementById("fe-pn")?.value||f.productName).trim();
  f.versionNote=(document.getElementById("fe-vn")?.value||"").trim();
  f.notes=(document.getElementById("fe-notes")?.value||"").trim();
  // Collect sensory fields from DOM
  const sKeys=["texture","appearance","taste","aroma","size"];
  const sTKeys=["internalFeedback","customerFeedback","others"];
  if(!f.sensory)f.sensory={};
  sKeys.forEach(k=>{const el=document.getElementById("fe-s-"+k);if(el)f.sensory[k]=el.value.trim();});
  sTKeys.forEach(k=>{const el=document.getElementById("fe-s-"+k);if(el)f.sensory[k]=el.value.trim();});
  if(!f.productCode)return document.getElementById("fe-err").textContent="Product Code required";
  if(!f.productName)return document.getElementById("fe-err").textContent="Product Name required";
  if(!f.batchSize||f.batchSize<=0)return document.getElementById("fe-err").textContent="Batch Size must be > 0";
  if(!f.ingredients.some(r=>r.itemCode))return document.getElementById("fe-err").textContent="Add at least 1 ingredient";
  for(const r of f.ingredients.filter(r=>r.itemCode)){if(!ST.ings.some(i=>i.itemCode.toLowerCase()===r.itemCode.toLowerCase()))return document.getElementById("fe-err").textContent=`"${r.itemCode}" not in Ingredients`;}
  if(ST.frms.find(x=>x.productCode.toLowerCase()===f.productCode.toLowerCase()&&(x.version||1)===(f.version||1)&&x.id!==f.id&&x.createdBy===ST.user.id))return document.getElementById("fe-err").textContent="Product Code V"+(f.version||1)+" already exists";
  f.ingredients=f.ingredients.filter(r=>r.itemCode);f.updatedAt=new Date().toISOString().slice(0,10);
  if(f.active){await dbDeactivateVersions(f.productCode,f.createdBy,f.id);ST.frms.filter(x=>x.productCode.toLowerCase()===f.productCode.toLowerCase()&&x.id!==f.id&&x.createdBy===ST.user.id).forEach(x=>x.active=false);}
  await dbSaveFrm(f);
  const ex=ST.frms.findIndex(x=>x.id===f.id);if(ex>=0)ST.frms[ex]=f;else ST.frms.push(f);
  flash("Saved — V"+(f.version||1));ST.frmView="list";render();
}

function buildExportRows(formulas){
  const rows=[];
  formulas.forEach(f=>{
    const s=f.sensory||{};
    const tq=f.ingredients.reduce((sum,r)=>sum+(+r.qty||0),0);
    const tc=f.ingredients.reduce((sum,r)=>sum+((+r.qty||0)*getIngPrice(r.itemCode)),0);
    const cpk=tq>0?tc/tq:0;
    const ings=f.ingredients.filter(r=>r.itemCode);
    if(ings.length===0)ings.push({itemCode:"",qty:0,pct:0});
    ings.forEach((ig,idx)=>{
      const ingName=getIngName(ig.itemCode);
      const ingPrice=getIngPrice(ig.itemCode);
      const lineCost=(+ig.pct||0)/100*ingPrice;
      const row={"Product Code":f.productCode,"Product Name":f.productName,"Version":f.version||1,"Version Note":f.versionNote||"","Active":f.active?"Yes":"No","Batch Size (kg)":f.batchSize,"Input Mode":f.inputMode||"kg",
        "Item Code":ig.itemCode,"Item Name":ingName,"Qty (kg)":+(+ig.qty).toFixed(4)||0,"%":+(+ig.pct).toFixed(4)||0,"Price/KG":+(ingPrice).toFixed(4)||0,"Line Cost/KG":+(lineCost).toFixed(4)||0};
      if(idx===0){
        row["Total Cost/KG"]=+(cpk).toFixed(4)||0;
        row["Mixing Instructions"]=f.notes||"";
        row["Texture"]=s.texture||"";row["Appearance"]=s.appearance||"";row["Taste"]=s.taste||"";row["Aroma"]=s.aroma||"";row["Size/Granulation"]=s.size||"";
        row["Internal Feedback"]=s.internalFeedback||"";row["Customer Feedback"]=s.customerFeedback||"";row["Others"]=s.others||"";
        // Skip base64 images, only include real URLs
        const imgUrl=s.imageUrl||"";
        row["Image URL"]=imgUrl.startsWith("data:")?("(image uploaded)"):imgUrl;
        row["Created"]=f.createdAt||"";row["Updated"]=f.updatedAt||"";
      }else{
        row["Total Cost/KG"]="";row["Mixing Instructions"]="";
        row["Texture"]="";row["Appearance"]="";row["Taste"]="";row["Aroma"]="";row["Size/Granulation"]="";
        row["Internal Feedback"]="";row["Customer Feedback"]="";row["Others"]="";row["Image URL"]="";
        row["Created"]="";row["Updated"]="";
      }
      rows.push(row);
    });
  });
  return rows;
}
function exportFrms(){
  try{
    const myF=ST.frms.filter(f=>f.createdBy===ST.user.id);
    const rows=buildExportRows(myF);
    if(!rows.length)return flash("No data to export");
    const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Formulas");XLSX.writeFile(wb,"SpiceCalc_Formulas.xlsx");flash("Exported");
  }catch(e){console.error("Export error",e);flash("Export failed: "+e.message);}
}
function exportFrmsSelected(){
  try{
    const selIds=Object.entries(ST.frmSel||{}).filter(([k,v])=>v).map(([k])=>k);
    if(!selIds.length)return flash("No formulas selected");
    const selF=ST.frms.filter(f=>selIds.includes(f.id));
    const rows=buildExportRows(selF);
    if(!rows.length)return flash("No data to export");
    const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Formulas");XLSX.writeFile(wb,"SpiceCalc_Formulas_Selected.xlsx");flash("Exported "+selF.length+" formula"+(selF.length>1?"s":""));
  }catch(e){console.error("Export error",e);flash("Export failed: "+e.message);}
}
function importFrms(e){
  const file=e.target.files?.[0];if(!file)return;const r=new FileReader();
  r.onload=async ev=>{try{const wb=XLSX.read(ev.target.result,{type:"binary"});const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);const now=new Date().toISOString().slice(0,10);const grp={};
  rows.forEach(r=>{const pc=String(r["Product Code"]||"").trim();const ic=String(r["Item Code"]||"").trim();if(!pc||!ic)return;const ver=+(r["Version"]||1);const gk=pc.toLowerCase()+"_v"+ver;if(!grp[gk])grp[gk]={productCode:pc,productName:String(r["Product Name"]||"").trim(),batchSize:+(r["Batch Size (kg)"]||100),version:ver,versionNote:String(r["Version Note"]||"").trim(),active:String(r["Active"]||"").toLowerCase()==="yes",ingredients:[]};grp[gk].ingredients.push({itemCode:ic,qty:+(r["Qty (kg)"]||0),pct:+(r["%"]||0)});});
  let a=0,u=0;for(const g of Object.values(grp)){const entry={...g,inputMode:"kg",createdBy:ST.user.id,updatedAt:now};const ex=ST.frms.findIndex(f=>f.productCode.toLowerCase()===g.productCode.toLowerCase()&&(f.version||1)===g.version&&f.createdBy===ST.user.id);
  if(ex>=0){Object.assign(ST.frms[ex],entry);await dbSaveFrm(ST.frms[ex]);u++;}else{const newFrm={...entry,id:"new",createdAt:now};await dbSaveFrm(newFrm);ST.frms.push(newFrm);a++;}}
  flash(a+" added, "+u+" updated");render();}catch(err){console.error(err);flash("Import failed");}e.target.value="";};r.readAsBinaryString(file);
}

/* ─── Init ─── */
init();
</script>
